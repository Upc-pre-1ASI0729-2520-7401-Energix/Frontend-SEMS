<mat-card class="monthly-card">
  <mat-card-header>
    <mat-card-title>{{ monthlyComparisonLabel }}</mat-card-title>
    <mat-card-subtitle>{{ comparisonLabel }}</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    <div class="monthly-content">
      @if (hasChartData()) {
        <canvas baseChart
                [data]="barChartData"
                [options]="barChartOptions"
                [type]="barChartType">
        </canvas>
      } @else {
        <div class="no-data">
          <mat-icon>bar_chart</mat-icon>
          <p>{{ 'dashboard.charts.noData' | translate }}</p>
        </div>
      }
    </div>
  </mat-card-content>
</mat-card>
