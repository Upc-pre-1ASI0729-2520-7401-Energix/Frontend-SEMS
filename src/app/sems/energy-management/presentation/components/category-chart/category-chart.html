<mat-card class="category-card">
  <mat-card-header>
    <mat-card-title>{{ 'dashboard.charts.consumptionByCategory' | translate }}</mat-card-title>
    <mat-card-subtitle>{{ 'dashboard.charts.byCategory' | translate }}</mat-card-subtitle>
  </mat-card-header>
  
  <mat-card-content>
    <div class="category-content" *ngIf="consumptionByCategory">
      <div class="donut-chart">
        <svg viewBox="0 0 200 200" class="donut-svg">
          <circle cx="100" cy="100" r="80" fill="none" stroke="#e0e0e0" stroke-width="30"/>
          <circle cx="100" cy="100" r="80" fill="none" stroke="#1976d2" stroke-width="30"
                  stroke-dasharray="251.2 251.2" stroke-dashoffset="62.8" 
                  transform="rotate(-90 100 100)"/>
          <circle cx="100" cy="100" r="80" fill="none" stroke="#1e88e5" stroke-width="30"
                  stroke-dasharray="125.6 376.8" stroke-dashoffset="-62.8" 
                  transform="rotate(-90 100 100)"/>
          <circle cx="100" cy="100" r="80" fill="none" stroke="#42a5f5" stroke-width="30"
                  stroke-dasharray="75.36 427.04" stroke-dashoffset="-188.4" 
                  transform="rotate(-90 100 100)"/>
          <circle cx="100" cy="100" r="80" fill="none" stroke="#90caf9" stroke-width="30"
                  stroke-dasharray="50.24 452.16" stroke-dashoffset="-263.76" 
                  transform="rotate(-90 100 100)"/>
        </svg>
      </div>
      
      <div class="legend">
        <div class="legend-item" *ngFor="let category of consumptionByCategory.categories; let i = index">
          <span class="legend-dot" [style.background-color]="getColor(i)"></span>
          <span class="legend-label">{{ category.name }}</span>
        </div>
      </div>
    </div>
    
    <div class="no-data" *ngIf="!consumptionByCategory">
      <p>{{ getTranslation('common.loading') }}</p>
    </div>
  </mat-card-content>
</mat-card>
