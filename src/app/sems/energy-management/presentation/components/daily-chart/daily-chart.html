<mat-card class="chart-card">
  <mat-card-header>
    <mat-card-title>{{ dailyConsumptionLabel }}</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <!-- Change dailyConsumption to hasChartData() -->
    <div class="chart-container" *ngIf="hasChartData(); else noData">
      <canvas baseChart [data]="lineChartData" [options]="lineChartOptions" [type]="lineChartType">
      </canvas>
    </div>

    <ng-template #noData>
      <div class="no-data-message">
        <mat-icon>show_chart</mat-icon>
        <p>{{ 'dashboard.charts.noData' | translate }}</p>
      </div>
    </ng-template>
  </mat-card-content>
</mat-card>
