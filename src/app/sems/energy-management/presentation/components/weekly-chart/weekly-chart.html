<div class="weekly-chart-container">
  <div class="chart-header">
    <h3>{{ 'reports.weeklyChart.title' | translate }}</h3>
  </div>

  <!-- Loading State -->
  <div *ngIf="isLoading" class="loading-container">
    <div class="loading-spinner"></div>
    <p>{{ 'common.loading' | translate }}</p>
  </div>

  <!-- Chart Content -->
  <div *ngIf="!isLoading" class="chart-content">
    <!-- No Data Message -->
    <div *ngIf="weeklyData.length === 0" class="no-data">
      <p>{{ 'reports.weeklyChart.noData' | translate }}</p>
    </div>

    <!-- Chart with data -->
    <div *ngIf="weeklyData.length > 0">
      <!-- Chart bars -->
      <div class="chart-bars">
        <div class="bar-container" *ngFor="let data of weeklyData">
          <div class="bar"
               [style.height.%]="getBarHeight(data.consumption)"
               [style.opacity]="weeklyAverage > 0 ? 1 : 0"
               [title]="formatTooltip(data)">
          </div>
          <span class="day-label">{{ getDayTranslation(data.day) }}</span>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="!isLoading && weeklyData.length > 0 && weeklyAverage > 0" class="chart-footer">
    <p class="weekly-average-text">
      {{ 'reports.weeklyChart.weeklyAverageMessage' | translate }}: 
      <strong>{{ weeklyAverage | number:'1.1-1' }} kWh</strong>
    </p>
  </div>
</div>
