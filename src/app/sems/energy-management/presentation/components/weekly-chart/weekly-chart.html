<div class="weekly-chart-container">
  <div class="chart-header">
    <h3>Weekly Consumption Trend</h3>
  </div>
  
  <div class="chart-content">
    <!-- Average line indicator -->
    <div class="average-line-container">
      <div class="average-line" [style.bottom.%]="getAverageLinePosition()"></div>
      <span class="average-label" [style.bottom.%]="getAverageLinePosition() + 2">Weekly Average</span>
    </div>

    <!-- Chart bars -->
    <div class="chart-bars">
      <div class="bar-container" *ngFor="let data of weeklyData">
        <div class="bar" 
             [style.height.%]="getBarHeight(data.consumption)"
             [title]="data.label + ': ' + data.consumption + ' kWh'">
        </div>
        <span class="day-label">{{ data.day }}</span>
      </div>
    </div>
  </div>

  <div class="chart-footer">
    <p class="comparison-text">{{ comparisonText }}</p>
    <p class="encouragement">Keep up the great work!</p>
  </div>
</div>
