<mat-card class="device-card">
  <mat-card-header>
    <mat-card-title>{{ devicesTitleLabel }}</mat-card-title>
  </mat-card-header>
  
  <mat-card-content>
    @if (devices.length > 0) {
      <div class="device-list">
        @for (device of devices; track device.id) {
          <div class="device-item">
            <mat-icon class="device-icon" [ngClass]="getDeviceClass(device.type)">
              {{ getDeviceIcon(device.type) }}
            </mat-icon>
            <div class="device-info">
              <span class="device-name">{{ device.getDisplayName() }}</span>
              <span class="device-status" [ngClass]="getStatusClass(device)">
                {{ getStatusText(device) }}
              </span>
            </div>
          </div>
        }
      </div>
    } @else {
      <div class="no-data">
        <p>{{ noDevicesLabel }}</p>
      </div>
    }
  </mat-card-content>
</mat-card>
