<div class="export-card-container">
  <div class="card-header">
    <h3>Export Report</h3>
  </div>
  
  <div class="card-content">
    <!-- Export Format Section -->
    <div class="form-section">
      <label class="section-label">Export Format:</label>
      <div class="format-selector">
        <select 
          [(ngModel)]="selectedFormat" 
          (change)="onFormatChange($event)"
          class="format-dropdown">
          <option *ngFor="let format of exportFormats" [value]="format.value">
            {{ format.label }}
          </option>
        </select>
      </div>
    </div>

    <!-- Export Period Section -->
    <div class="form-section">
      <div class="period-options">
        <div class="checkbox-group" *ngFor="let period of exportPeriods">
          <label class="checkbox-label">
            <input 
              type="checkbox" 
              [checked]="period.checked"
              (change)="onPeriodChange(period)"
              class="checkbox-input">
            <span class="checkbox-custom"></span>
            {{ period.label }}
          </label>
        </div>
      </div>
    </div>

    <!-- Email Section -->
    <div class="form-section">
      <div class="email-section">
        <input 
          type="email" 
          [(ngModel)]="email"
          placeholder="Enter email address"
          class="email-input"
          [class.invalid]="!isValidEmail() && email.length > 0">
        <button 
          (click)="onSendReport()"
          [disabled]="isLoading || !isValidEmail()"
          class="send-button">
          <span *ngIf="!isLoading">Send Report</span>
          <span *ngIf="isLoading" class="loading-text">
            <span class="spinner"></span>
            Sending...
          </span>
        </button>
      </div>
    </div>

    <!-- Download Button -->
    <div class="form-section">
      <button 
        (click)="onDownload()"
        [disabled]="isLoading"
        class="download-button">
        <span *ngIf="!isLoading">Download</span>
        <span *ngIf="isLoading" class="loading-text">
          <span class="spinner"></span>
          Downloading...
        </span>
      </button>
    </div>
  </div>
</div>
