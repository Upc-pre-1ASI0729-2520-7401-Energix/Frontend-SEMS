<div class="export-card-container">
  <div class="card-header">
    <h3>{{ 'reports.export.title' | translate }}</h3>
  </div>
  
  <div class="card-content">
    <!-- Single row layout -->
    <div class="export-controls-row">
      <!-- Export Format -->
      <div class="format-section">
        <label class="section-label">{{ 'reports.export.format' | translate }}</label>
        <select 
          [(ngModel)]="selectedFormat" 
          (change)="onFormatChange($event)"
          class="format-dropdown">
          <option *ngFor="let format of exportFormats" [value]="format.value">
            {{ format.label }}
          </option>
        </select>
      </div>

      <!-- Checkboxes -->
      <div class="checkboxes-section">
        <div class="checkbox-group" *ngFor="let period of exportPeriods">
          <label class="checkbox-label">
            <input 
              type="checkbox" 
              [checked]="period.checked"
              (change)="onPeriodChange(period)"
              class="checkbox-input">
            <span class="checkbox-custom"></span>
            {{ period.labelKey | translate }}
          </label>
        </div>
      </div>

      <!-- Download Button -->
      <button 
        (click)="onDownload()"
        [disabled]="isDownloading"
        class="download-button">
        <span *ngIf="!isDownloading">{{ 'reports.export.buttons.download' | translate }}</span>
        <span *ngIf="isDownloading" class="loading-text">
          <span class="spinner"></span>
          {{ 'reports.export.buttons.downloading' | translate }}
        </span>
      </button>
    </div>

    <!-- Email row -->
    <div class="email-row">
      <input 
        type="email" 
        [(ngModel)]="email"
        [placeholder]="'reports.export.emailPlaceholder' | translate"
        class="email-input"
        [class.invalid]="!isValidEmail() && email.length > 0">
      <button 
        (click)="onSendReport()"
        [disabled]="isSending || !isValidEmail()"
        class="send-button">
        <span *ngIf="!isSending">{{ 'reports.export.buttons.sendReport' | translate }}</span>
        <span *ngIf="isSending" class="loading-text">
          <span class="spinner"></span>
          {{ 'reports.export.buttons.sending' | translate }}
        </span>
      </button>
    </div>
  </div>
</div>
