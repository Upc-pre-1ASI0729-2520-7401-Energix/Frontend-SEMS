<div class="profile-container" *ngIf="!isLoading && user">
  <!-- Page Header -->
  <div class="page-header">
    <h1>{{ 'profile.title' | translate }}</h1>
  </div>

  <div class="profile-card">
    <!-- Left section: Info -->
    <div class="profile-info-section">
      <div class="profile-details">
        <div class="profile-item">
          <label>{{ 'profile.firstName' | translate }}:</label>
          <span *ngIf="!editable" class="value">{{ editableProfile.firstName }}</span>
          <input *ngIf="editable" [(ngModel)]="editableProfile.firstName" class="input-edit" />
        </div>

        <div class="profile-item">
          <label>{{ 'profile.lastName' | translate }}:</label>
          <span *ngIf="!editable" class="value">{{ editableProfile.lastName }}</span>
          <input *ngIf="editable" [(ngModel)]="editableProfile.lastName" class="input-edit" />
        </div>

        <div class="profile-item">
          <label>{{ 'profile.email' | translate }}:</label>
          <span *ngIf="!editable" class="value">{{ editableProfile.email }}</span>
          <input *ngIf="editable" [(ngModel)]="editableProfile.email" class="input-edit" />
        </div>

        <div class="profile-item">
          <label>{{ 'profile.address' | translate }}:</label>
          <span *ngIf="!editable" class="value">{{ editableProfile.address }}</span>
          <input *ngIf="editable" [(ngModel)]="editableProfile.address" class="input-edit" />
        </div>

        <div class="profile-item">
          <label>{{ 'profile.phoneNumber' | translate }}:</label>
          <span *ngIf="!editable" class="value">{{ editableProfile.phoneNumber }}</span>
          <input *ngIf="editable" [(ngModel)]="editableProfile.phoneNumber" class="input-edit" />
        </div>
      </div>

      <!-- Action buttons -->
      <div class="profile-actions">
        <button *ngIf="!editable" class="edit-btn" (click)="onEdit()">
          {{ 'profile.editButton' | translate }}
        </button>
        <button *ngIf="editable" class="save-btn" (click)="saveChanges()">
          {{ 'profile.saveButton' | translate }}
        </button>
        <button *ngIf="editable" class="cancel-btn" (click)="onEdit()">
          {{ 'profile.cancelButton' | translate }}
        </button>
      </div>
    </div>

    <!-- Right section: Photo -->
    <div class="profile-photo-section">
      <img
        [src]="profilePhotoUrl"
        alt="Profile Photo"
        class="profile-photo"
      />
      <button
        class="change-photo-btn"
        type="button"
        (click)="changePhoto()"
      >
        {{ 'profile.changePhotoButton' | translate }}
      </button>
    </div>
  </div>
</div>

<!-- Loading state -->
<div class="profile-empty" *ngIf="isLoading">
  <p>{{ 'profile.loading' | translate }}</p>
</div>

<!-- No user state -->
<div class="profile-empty" *ngIf="!isLoading && !user">
  <p>{{ 'profile.noUser' | translate }}</p>
</div>
