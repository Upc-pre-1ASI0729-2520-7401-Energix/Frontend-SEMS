<div class="dashboard-container">
  <!-- Stats Cards Row -->
  <div class="stats-row">
    <app-stats-card 
      [title]="energyConsumptionLabel" 
      [value]="dashboardStats.energyConsumption + ' kWh'"
      [subtitle]="monthlySavingGoalLabel">
    </app-stats-card>
    
    <app-stats-card 
      [title]="estimatedSavingsLabel" 
      [value]="dashboardStats.estimatedSavings + '%'"
      [subtitle]="consumptionLabel">
    </app-stats-card>
    
    <app-stats-card 
      [title]="activeDevicesLabel" 
      [value]="dashboardStats.activeDevices + ' ' + devicesLabel"
      subtitle="">
    </app-stats-card>
    
    <app-stats-card 
      [title]="estimatedBillLabel" 
      [value]="dashboardStats.currency + ' ' + dashboardStats.estimatedBill"
      subtitle="">
    </app-stats-card>
    
    <app-stats-card 
      [title]="todayConsumptionLabel" 
      [value]="dashboardStats.todayConsumption + ' kWh'"
      subtitle="">
    </app-stats-card>
  </div>

  <!-- Charts Row -->
  <div class="charts-row">
    <div class="chart-large">
      <app-daily-chart [dailyConsumption]="dailyConsumption"></app-daily-chart>
    </div>
    
    <div class="chart-small">
      <app-category-chart [consumptionByCategory]="consumptionByCategory"></app-category-chart>
    </div>
  </div>

  <!-- Bottom Row -->
  <div class="bottom-row">
    <div class="chart-medium">
      <app-monthly-chart [monthlyComparison]="monthlyComparison"></app-monthly-chart>
    </div>

    <div class="alerts-section">
      <mat-card class="alerts-card">
        <mat-card-header>
          <mat-card-title>{{ alertsTitleLabel }}</mat-card-title>
        </mat-card-header>
        <mat-card-content>
          <div class="alert-item warning">
            <mat-icon>warning</mat-icon>
            <div class="alert-content">
              <strong>{{ highConsumptionLabel }}</strong>
              <p>{{ highConsumptionMessageLabel }}</p>
            </div>
          </div>
          
          <div class="alert-item info">
            <mat-icon>info</mat-icon>
            <div class="alert-content">
              <strong>{{ reminderLabel }}</strong>
              <p>{{ reminderMessageLabel }}</p>
            </div>
          </div>
        </mat-card-content>
      </mat-card>
    </div>

    <div class="devices-section">
      <app-device-list [devices]="devices"></app-device-list>
    </div>
  </div>
</div>
