<div class="lang-switcher">
  <div class="language-toggle">
    @for (language of languages; track language.code) {
      <button 
        [class]="'lang-btn ' + (currentLanguage === language.code ? 'active' : '')"
        (click)="onLanguageChange(language.code)"
        type="button">
        <span class="language-text">{{ language.code.toUpperCase() }}</span>
      </button>
    }
  </div>
</div>
